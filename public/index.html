<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#E8517A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Little Heartbeat">
  <meta name="application-name" content="Little Heartbeat">
  <meta name="description" content="AI-powered pregnancy safety companion with real-time emergency alerts">
  <meta name="mobile-web-app-capable" content="yes">
  
  <title>Little Heartbeat - Pregnancy Safety Companion</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background-color: #FFF8FA;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    
    #root {
      height: 100%;
      width: 100%;
    }
    
    /* Loading screen */
    .app-loading {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #FFE4EE 0%, #E8F4FF 100%);
      z-index: 9999;
    }
    
    .app-loading .logo {
      font-size: 64px;
      margin-bottom: 16px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    
    .app-loading .title {
      font-size: 24px;
      font-weight: 700;
      color: #E8517A;
      margin-bottom: 8px;
    }
    
    .app-loading .subtitle {
      font-size: 14px;
      color: #B09AB3;
    }
    
    .app-loading .spinner {
      margin-top: 24px;
      width: 40px;
      height: 40px;
      border: 3px solid #FFD6E5;
      border-top-color: #E8517A;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* PWA install prompt */
    .pwa-install-prompt {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      padding: 16px 24px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(232, 81, 122, 0.3);
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 10000;
      animation: slideUp 0.3s ease;
    }
    
    @keyframes slideUp {
      from { transform: translateX(-50%) translateY(100px); opacity: 0; }
      to { transform: translateX(-50%) translateY(0); opacity: 1; }
    }
    
    .pwa-install-prompt button {
      background: #E8517A;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }
    
    .pwa-install-prompt button.dismiss {
      background: transparent;
      color: #B09AB3;
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="app-loading">
      <div class="logo">💗</div>
      <div class="title">Little Heartbeat</div>
      <div class="subtitle">Your pregnancy safety companion</div>
      <div class="spinner"></div>
    </div>
  </div>
  
  <script>
    // PWA Install Prompt Handler
    let deferredPrompt;
    
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      
      // Show custom install prompt after 10 seconds
      setTimeout(() => {
        if (deferredPrompt && !localStorage.getItem('pwa_install_dismissed')) {
          showInstallPrompt();
        }
      }, 10000);
    });
    
    function showInstallPrompt() {
      const prompt = document.createElement('div');
      prompt.className = 'pwa-install-prompt';
      prompt.innerHTML = `
        <span>💗</span>
        <span style="flex:1">Install app for better experience</span>
        <button onclick="installPWA()">Install</button>
        <button class="dismiss" onclick="dismissInstall()">Later</button>
      `;
      document.body.appendChild(prompt);
    }
    
    async function installPWA() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
          hideInstallPrompt();
        }
        deferredPrompt = null;
      }
    }
    
    function dismissInstall() {
      localStorage.setItem('pwa_install_dismissed', 'true');
      hideInstallPrompt();
    }
    
    function hideInstallPrompt() {
      const prompt = document.querySelector('.pwa-install-prompt');
      if (prompt) prompt.remove();
    }
    
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(registration => {
            console.log('SW registered:', registration);
          })
          .catch(error => {
            console.log('SW registration failed:', error);
          });
      });
    }
    
    // Prevent pull-to-refresh on mobile
    document.body.addEventListener('touchmove', (e) => {
      if (e.target === document.body) {
        e.preventDefault();
      }
    }, { passive: false });
  </script>
</body>
</html>
