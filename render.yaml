databases:
  - name: little-heartbeat-db
    plan: free
    region: ohio
    ipAllowList: []

services:
  - type: web
    name: little-heartbeat-api
    env: python
    region: ohio
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: bash backend/scripts/startup.sh
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: little-heartbeat-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://your-app.vercel.app
      - key: UPLOAD_DIR
        value: /var/data/uploads
