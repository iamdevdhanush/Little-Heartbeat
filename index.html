<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#4A3B4D">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Little Heartbeat">
  <meta name="application-name" content="Little Heartbeat">
  <meta name="description" content="AI-powered pregnancy safety companion with real-time emergency alerts">
  <meta name="mobile-web-app-capable" content="yes">
  
  <title>Little Heartbeat - Pregnancy Safety Companion</title>
  <link rel="stylesheet" href="/app.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background-color: #FBFBFC;
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    
    #root {
      height: 100%;
      width: 100%;
    }
    
    /* Loading screen */
    .app-loading {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #FBFBFC;
      z-index: 9999;
    }
    
    .app-loading .icon {
      font-size: 48px;
      margin-bottom: 20px;
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #F0F1F2;
      border-radius: 24px;
    }
    
    .app-loading .title {
      font-size: 24px;
      font-weight: 700;
      color: #4A3B4D;
      margin-bottom: 6px;
    }
    
    .app-loading .subtitle {
      font-size: 14px;
      color: #7c757b;
    }
    
    .app-loading .bar {
      margin-top: 32px;
      width: 120px;
      height: 3px;
      background: #E8E6E8;
      border-radius: 2px;
      overflow: hidden;
    }
    
    .app-loading .bar-inner {
      height: 100%;
      width: 30%;
      background: #5C7CFA;
      border-radius: 2px;
      animation: bar 1.2s ease-in-out infinite;
    }
    
    @keyframes bar {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(400%); }
    }
    
    /* PWA install prompt */
    .pwa-install-prompt {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      padding: 16px 24px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 10000;
      animation: slideUp 0.3s ease;
    }
    
    @keyframes slideUp {
      from { transform: translateX(-50%) translateY(100px); opacity: 0; }
      to { transform: translateX(-50%) translateY(0); opacity: 1; }
    }
    
    .pwa-install-prompt button {
      background: #5C7CFA;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }
    
    .pwa-install-prompt button.dismiss {
      background: transparent;
      color: #7c757b;
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="app-loading">
      <div class="icon">💗</div>
      <div class="title">Little Heartbeat</div>
      <div class="subtitle">Your pregnancy companion</div>
      <div class="bar"><div class="bar-inner"></div></div>
    </div>
  </div>
  
  <script>
    // PWA Install Prompt Handler
    let deferredPrompt;
    
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      
      // Show custom install prompt after 10 seconds
      setTimeout(() => {
        if (deferredPrompt && !localStorage.getItem('pwa_install_dismissed')) {
          showInstallPrompt();
        }
      }, 10000);
    });
    
    function showInstallPrompt() {
      const prompt = document.createElement('div');
      prompt.className = 'pwa-install-prompt';
      prompt.innerHTML = `
        <span>💗</span>
        <span style="flex:1">Install app for better experience</span>
        <button onclick="installPWA()">Install</button>
        <button class="dismiss" onclick="dismissInstall()">Later</button>
      `;
      document.body.appendChild(prompt);
    }
    
    async function installPWA() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
          hideInstallPrompt();
        }
        deferredPrompt = null;
      }
    }
    
    function dismissInstall() {
      localStorage.setItem('pwa_install_dismissed', 'true');
      hideInstallPrompt();
    }
    
    function hideInstallPrompt() {
      const prompt = document.querySelector('.pwa-install-prompt');
      if (prompt) prompt.remove();
    }
    
    
    // Prevent pull-to-refresh on mobile
    document.body.addEventListener('touchmove', (e) => {
      if (e.target === document.body) {
        e.preventDefault();
      }
    }, { passive: false });
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
